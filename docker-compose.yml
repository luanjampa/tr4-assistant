# TR4 API — dev local
#
# Groq (chat) e Cloudflare Workers AI (embeddings) são externos — só
# precisam de GROQ_API_KEY / CLOUDFLARE_API_TOKEN no .env, nada pra rodar
# localmente além do Postgres.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tr4
      POSTGRES_PASSWORD: tr4
      POSTGRES_DB: tr4
    ports:
      - "5433:5432"
    volumes:
      - tr4_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tr4"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - tr4_data:/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  tr4_data:
  tr4_pgdata:
