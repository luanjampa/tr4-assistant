<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TR4 Assistant — Pajero TR4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>TR4 Assistant</h1>
    <p class="subtitle">Peças, manutenção e instalação — Pajero TR4</p>
    <p id="kb-status" class="kb-status"></p>
  </header>

  <main id="app">
    <section id="chat-log" aria-live="polite"></section>

    <form id="chat-form" class="composer">
      <textarea
        id="chat-input"
        placeholder="Pergunte sobre peça, manutenção ou instalação do TR4..."
        rows="1"
        maxlength="8000"
        required
      ></textarea>
      <button type="submit" id="send-btn">Enviar</button>
    </form>
    <div id="status-line" class="status-line"></div>
  </main>

  <footer class="footer">
    <p>
      Fontes: manual oficial Mitsubishi Pajero TR4, grupo de WhatsApp,
      pesquisa web, relatos de donos,
      <a href="https://tr4cwb.wixsite.com/tr4cwb" target="_blank" rel="noopener noreferrer">TR4 CWB</a>
      e
      <a href="https://drive.google.com/drive/u/0/folders/1ztNLKBsjOxdr3yZWTU-s_fmxqKJC22DY" target="_blank" rel="noopener noreferrer">pasta de documentos compartilhada</a>.
    </p>
    <p>
      <a href="https://github.com/luanjampa/tr4-assistant" target="_blank" rel="noopener noreferrer">Código no GitHub</a>
    </p>
  </footer>

  <!-- Outside the overlay on purpose: Turnstile needs to stay in normal
       layout flow (not inside a display:none ancestor) since it's invoked
       fresh before every /chat send, not just during the terms gate. -->
  <div id="turnstile-container"></div>

  <div id="terms-overlay" class="overlay" hidden>
    <div class="terms-box">
      <h2>Antes de começar</h2>
      <p id="terms-text">Carregando termos...</p>
      <button id="accept-btn" type="button">Entendi e aceito</button>
    </div>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="app.js"></script>
</body>
</html>
